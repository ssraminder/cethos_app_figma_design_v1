[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"

[build.environment]
  # PING_MESSAGE and VITE_PUBLIC_BUILDER_KEY are demo/placeholder values
  # (not secrets) but exist in both .env and Netlify env vars, which trips
  # the secrets scanner. Skip them.
  SECRETS_SCAN_OMIT_KEYS = "PING_MESSAGE,VITE_PUBLIC_BUILDER_KEY"
  # Bump Node heap for Vite build + Sentry source map generation.
  # Default 2GB OOMs on this bundle (~4MB minified, 3000+ modules).
  NODE_OPTIONS = "--max-old-space-size=4096"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200