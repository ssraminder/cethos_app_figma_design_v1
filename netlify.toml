[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"

[build.environment]
  # Non-secret env vars whose values appear in committed code (org slugs,
  # project identifiers, placeholder strings). Skip the secrets scanner.
  SECRETS_SCAN_OMIT_KEYS = "PING_MESSAGE,VITE_PUBLIC_BUILDER_KEY,SENTRY_ORG,SENTRY_PROJECT"
  # Bump Node heap for Vite build + Sentry source map generation.
  # Default 2GB OOMs on this bundle (~4MB minified, 3000+ modules).
  NODE_OPTIONS = "--max-old-space-size=4096"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200