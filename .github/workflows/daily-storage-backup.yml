name: Daily Supabase Storage backup

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily
  workflow_dispatch: {}

jobs:
  replicate:
    runs-on: ubuntu-latest
    env:
      RCLONE_CONFIG_SUPABASE_TYPE: s3
      RCLONE_CONFIG_SUPABASE_PROVIDER: Other
      RCLONE_CONFIG_SUPABASE_ENDPOINT: https://lmzoyezvsjgsxveoakdr.storage.supabase.co/storage/v1/s3
      RCLONE_CONFIG_SUPABASE_REGION: us-east-1
      RCLONE_CONFIG_SUPABASE_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
      RCLONE_CONFIG_SUPABASE_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
      RCLONE_CONFIG_AWSBACKUP_TYPE: s3
      RCLONE_CONFIG_AWSBACKUP_PROVIDER: AWS
      RCLONE_CONFIG_AWSBACKUP_REGION: us-east-2
      RCLONE_CONFIG_AWSBACKUP_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      RCLONE_CONFIG_AWSBACKUP_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash
      - name: Replicate Supabase Storage to AWS S3
        run: |
          rclone copy supabase: awsbackup:cethos-translation-app-storage-backup \
            --s3-no-check-bucket \
            --size-only \
            --fast-list \
            --transfers 4 \
            --checkers 8 \
            --retries 5 \
            --low-level-retries 20 \
            --retries-sleep 10s \
            --log-level INFO \
            --stats 30s \
            --stats-one-line
